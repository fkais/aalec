<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>cella - 刷题</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="css/style.css?v=2.0.0">
</head>
<body class="locked" data-page="quiz">
    <section id="accessGate" class="access-gate">
        <div class="access-card">
            <p class="access-kicker brand-script">cella</p>
            <h1>唤醒你的知识生命</h1>
            <p>先进入演示，感受 Cella 如何回应每一次练习。</p>
            <button id="demoBtn" class="access-btn demo-btn" type="button">
                <span>进入陪伴演示</span>
                <small>无需同步码</small>
            </button>
            <div class="access-divider"><span>或继续自己的 Cella</span></div>
            <label class="access-input">
                <span>学习同步码</span>
                <input id="syncInput" type="password" autocomplete="off" placeholder="不同设备输入同一个同步码">
            </label>
            <button id="inviteBtn" class="access-btn access-btn-quiet">继续生长</button>
            <p id="inviteError" class="access-error" role="alert"></p>
        </div>
    </section>

    <header class="topbar">
        <div>
            <a class="back-link home-return" href="./index.html?v=2.0.0">返回主页</a>
            <h1 id="subjectTitle">cella</h1>
            <p id="subjectSubtitle">正在加载题库...</p>
        </div>
        <div class="score-box">
            <span id="scoreText">0 / 0</span>
            <small>已成为记忆</small>
        </div>
    </header>

    <main class="layout">
        <aside class="sidebar" id="sidebar">
            <button class="nav-btn active" data-view="practice">一起练习</button>
            <button class="nav-btn" data-view="wrong">待修复记忆</button>
            <button class="nav-btn" data-view="review">高频记忆</button>
            <button class="nav-btn" data-view="code">设计题</button>
        </aside>

        <section class="content">
            <div id="statsBar" class="stats-bar"></div>

            <section id="practiceView" class="view active">
                <div class="toolbar">
                    <div class="filter-panel">
                        <div id="typeFilters" class="filters"></div>
                        <div id="chapterFilters" class="filters chapter-filters"></div>
                        <label class="search-box">
                            <span>检索</span>
                            <input id="searchInput" type="search" placeholder="输入关键词检索题干、选项、答案或章节">
                        </label>
                    </div>
                    <div class="actions">
                        <button id="randomBtn" class="secondary">陪我选一题</button>
                        <button id="resetBtn" class="secondary reset-data-btn">重置数据</button>
                    </div>
                </div>
                <div id="questionList" class="question-list"></div>
            </section>

            <section id="wrongView" class="view">
                <div class="section-head">
                    <h2>错题本</h2>
                    <button id="clearWrongBtn" class="secondary">完成修复</button>
                </div>
                <div id="wrongList" class="question-list"></div>
            </section>

            <section id="reviewView" class="view">
                <div class="section-head">
                    <h2>高频背诵</h2>
                    <span class="muted">考前先背这部分</span>
                </div>
                <div id="reviewList" class="review-grid"></div>
            </section>

            <section id="codeView" class="view">
                <div class="section-head">
                    <h2>设计题</h2>
                    <span class="muted">每题包含题目、流程、包/文件位置和标准答案</span>
                </div>
                <div id="codeList" class="code-list"></div>
            </section>
        </section>
    </main>

    <aside id="floatingCompanion" class="floating-companion" data-mood="resting" aria-live="polite">
        <div id="companionBubble" class="companion-bubble">我醒啦。今天也陪你记住一点点。</div>
        <button id="companionCell" class="companion-cell" type="button" aria-label="移动 Cella">
            <span class="companion-nucleus"></span>
            <span class="companion-eye eye-one"></span>
            <span class="companion-eye eye-two"></span>
            <span class="companion-mouth"></span>
        </button>
    </aside>

    <script src="js/analytics.js?v=2.0.0"></script>
    <script src="js/quiz-engine.js?v=2.0.0"></script>
</body>
</html>
