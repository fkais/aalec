<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>cella - 学习数据</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="css/style.css?v=2.0.0">
</head>
<body class="locked" data-page="dashboard">
    <section id="accessGate" class="access-gate">
        <div class="access-card">
            <p class="access-kicker brand-script">cella</p>
            <h1>同步学习进度</h1>
            <p>输入学习同步码，查看同一身份下的匿名学习数据。</p>
            <label class="access-input">
                <span>学习同步码</span>
                <input id="syncInput" type="password" autocomplete="off" placeholder="不同设备输入同一个同步码">
            </label>
            <button id="inviteBtn" class="access-btn">查看数据</button>
            <p id="inviteError" class="access-error" role="alert"></p>
        </div>
    </section>

    <header class="dashboard-header">
        <a class="back-link home-return" href="./index.html?v=2.0.0">返回主页</a>
        <div>
            <p class="eyebrow">匿名学习数据</p>
            <h1>学习数据中心</h1>
        </div>
        <label class="dashboard-filter">
            <span>统计范围</span>
            <select id="dashboardSubject">
                <option value="">全部科目</option>
                <option value="javaweb">Java Web</option>
                <option value="os">计算机组成原理</option>
                <option value="bigdata">大数据原理与应用</option>
                <option value="se">软件工程</option>
            </select>
        </label>
    </header>

    <main class="dashboard-shell">
        <section id="dashboardLoading" class="dashboard-message">正在读取统计数据...</section>
        <section id="dashboardError" class="dashboard-message dashboard-error" hidden></section>

        <div id="dashboardContent" hidden>
            <section class="metric-grid">
                <article><span>当前排名</span><strong id="ownRank">-</strong></article>
                <article><span>参与人数</span><strong id="participantCount">0</strong></article>
                <article><span>掌握题数</span><strong id="correctQuestions">0</strong></article>
                <article><span>个人正确率</span><strong id="ownAccuracy">0%</strong></article>
            </section>

            <section class="dashboard-band">
                <div class="dashboard-section-head">
                    <div>
                        <p class="eyebrow">匿名排行</p>
                        <h2>掌握题数排行榜</h2>
                    </div>
                    <span>仅显示匿名编号</span>
                </div>
                <div class="leaderboard-wrap">
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>匿名编号</th>
                                <th>掌握题数</th>
                                <th>已答题数</th>
                                <th>正确率</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script src="js/analytics.js?v=2.0.0"></script>
    <script src="js/quiz-engine.js?v=2.0.0"></script>
    <script src="js/dashboard.js?v=2.0.0"></script>
</body>
</html>
