<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>cella - 学习数据</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="css/style.css?v=2.0.0">
</head>
<body class="locked" data-page="dashboard">
    <section id="accessGate" class="access-gate">
        <div class="access-card">
            <p class="access-kicker brand-script">cella</p>
            <h1>看看它长成了什么样</h1>
            <p>这里记录的不只是数字，也是你和 Cella 一起走过的学习痕迹。</p>
            <button id="demoBtn" class="access-btn demo-btn" type="button">
                <span>查看成长演示</span>
                <small>无需同步码</small>
            </button>
            <div class="access-divider"><span>或查看自己的成长记录</span></div>
            <label class="access-input">
                <span>学习同步码</span>
                <input id="syncInput" type="password" autocomplete="off" placeholder="不同设备输入同一个同步码">
            </label>
            <button id="inviteBtn" class="access-btn access-btn-quiet">查看成长记录</button>
            <p id="inviteError" class="access-error" role="alert"></p>
        </div>
    </section>

    <header class="dashboard-header">
        <a class="back-link home-return" href="./index.html?v=2.0.0">返回主页</a>
        <div>
            <p class="eyebrow">Cella 生长日志</p>
            <h1>成长记录</h1>
        </div>
        <label class="dashboard-filter">
            <span>统计范围</span>
            <select id="dashboardSubject">
                <option value="">全部科目</option>
                <option value="javaweb">Java Web</option>
                <option value="os">计算机组成原理</option>
                <option value="bigdata">大数据原理与应用</option>
                <option value="se">软件工程</option>
            </select>
        </label>
    </header>

    <main class="dashboard-shell">
        <section id="dashboardLoading" class="dashboard-message">正在读取统计数据...</section>
        <section id="dashboardError" class="dashboard-message dashboard-error" hidden></section>

        <div id="dashboardContent" hidden>
            <section class="metric-grid">
                <article><span>共同生长位置</span><strong id="ownRank">-</strong></article>
                <article><span>培养皿伙伴</span><strong id="participantCount">0</strong></article>
                <article><span>稳定记忆</span><strong id="correctQuestions">0</strong></article>
                <article><span>成长稳定度</span><strong id="ownAccuracy">0%</strong></article>
            </section>

            <section class="dashboard-band">
                <div class="dashboard-section-head">
                    <div>
                        <p class="eyebrow">共同培养皿</p>
                        <h2>今晚还有其他生命在生长</h2>
                    </div>
                    <span>彼此匿名，但并不孤单</span>
                </div>
                <div class="leaderboard-wrap">
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>匿名编号</th>
                                <th>掌握题数</th>
                                <th>已答题数</th>
                                <th>正确率</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script src="js/analytics.js?v=2.0.0"></script>
    <script src="js/quiz-engine.js?v=2.0.0"></script>
    <script src="js/dashboard.js?v=2.0.0"></script>
</body>
</html>
