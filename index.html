<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>cella</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="css/style.css?v=2.0.0">
</head>
<body class="locked home-network-page" data-page="home">
    <section id="accessGate" class="access-gate">
        <div class="access-card">
            <p class="access-kicker brand-script">cella</p>
            <h1>同步学习进度</h1>
            <p>输入学习同步码，在不同设备继续同一份复习进度。</p>
            <label class="access-input">
                <span>学习同步码</span>
                <input id="syncInput" type="password" autocomplete="off" placeholder="不同设备输入同一个同步码">
            </label>
            <button id="inviteBtn" class="access-btn">进入复习</button>
            <p id="inviteError" class="access-error" role="alert"></p>
        </div>
    </section>

    <main class="knowledge-network" id="knowledgeNetwork">
        <header class="network-brand">
            <div>
                <p class="brand-script">cella</p>
            </div>
            <div class="network-actions">
                <button id="profileCellBtn" class="profile-cell-btn" type="button"
                    aria-label="打开我的细胞" aria-expanded="false" aria-controls="profileCellPanel">
                    <span class="profile-cell-core" aria-hidden="true"></span>
                </button>
                <section id="profileCellPanel" class="profile-cell-panel" hidden>
                    <div class="profile-tabs" role="tablist" aria-label="用户信息">
                        <button class="profile-tab is-active" type="button" role="tab"
                            aria-selected="true" data-profile-tab="mine">我的</button>
                        <button class="profile-tab" type="button" role="tab"
                            aria-selected="false" data-profile-tab="ranking">排名</button>
                    </div>

                    <div class="profile-tab-panel is-active" data-profile-panel="mine">
                        <dl class="profile-identity">
                            <div>
                                <dt>我的匿名编号</dt>
                                <dd id="profileAnonymousId">生成中...</dd>
                            </div>
                            <div>
                                <dt>我的身份同步码</dt>
                                <dd id="profileSyncCode">未设置</dd>
                            </div>
                        </dl>
                        <fieldset class="cell-color-picker">
                            <legend>我的细胞颜色</legend>
                            <div id="cellColorOptions" class="cell-color-options"></div>
                        </fieldset>
                    </div>

                    <div class="profile-tab-panel" data-profile-panel="ranking" hidden>
                        <ol id="profileRankingList" class="profile-ranking-list"></ol>
                        <a class="profile-data-link" href="dashboard.html">查看完整学习数据</a>
                    </div>
                </section>
            </div>
        </header>

        <svg id="networkLines" class="network-lines" aria-hidden="true"></svg>

        <button class="study-node central-node" data-node="center" type="button">
            <span>期末复习</span>
        </button>

        <div id="subjectNodes" class="subject-node-layer"></div>

        <div id="typeNodes" class="type-node-layer" aria-live="polite"></div>

        <aside class="overall-progress" aria-label="总体学习进度">
            <div class="progress-beaker" aria-label="学习进度细胞烧杯">
                <span class="beaker-rim" aria-hidden="true"></span>
                <div id="beakerCells" class="beaker-cells" aria-hidden="true"></div>
                <span class="beaker-liquid" aria-hidden="true"></span>
                <span class="beaker-mark beaker-mark-one" aria-hidden="true"></span>
                <span class="beaker-mark beaker-mark-two" aria-hidden="true"></span>
            </div>
            <div class="overall-progress-body">
                <p class="overall-progress-summary">
                    <strong id="overallProgressLabel">总览</strong>
                    <span id="overallProgressCount">0 / 348</span>
                    <span id="overallProgressPercent">0%</span>
                </p>
                <div id="overallProgressCells" class="overall-progress-cells" aria-hidden="true"></div>
            </div>
        </aside>

        <div id="networkDataState" class="network-data-state" role="status" aria-live="polite" hidden>
            <span id="networkDataMessage"></span>
            <button id="networkRetryBtn" type="button" hidden>重试</button>
        </div>

        <aside id="libraryUpdateCard" class="library-update is-open" aria-label="题库更新记录">
            <button id="libraryUpdateToggle" class="library-update-toggle" type="button" aria-expanded="true">
                <span class="library-update-dot" aria-hidden="true"></span>
                <span class="library-update-label">新</span>
            </button>
            <div class="library-update-content">
                <span id="libraryVersion"></span>
                <p id="libraryUpdate"></p>
            </div>
        </aside>
    </main>

    <script src="js/analytics.js?v=2.0.0"></script>
    <script src="js/quiz-engine.js?v=2.0.0"></script>
    <script src="js/knowledge-network.js?v=2.0.0"></script>
</body>
</html>
